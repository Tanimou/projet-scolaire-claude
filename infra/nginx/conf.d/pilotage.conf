# =============================================================================
# Pilotage Scolaire — vhost reverse proxy
# =============================================================================
upstream web_upstream {
  server web:3000;
  keepalive 32;
}
upstream api_upstream {
  server api:4000;
  keepalive 32;
}
upstream keycloak_upstream {
  server keycloak:8080;
  keepalive 32;
}

# Rate-limit zones
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=120r/m;

# Honour an upstream proxy's X-Forwarded-Proto (e.g. Traefik terminating TLS in
# front of this nginx) so Keycloak/NextAuth see the REAL external scheme (https).
# Falls back to this server's own $scheme when no header is present (standalone).
map $http_x_forwarded_proto $fwd_proto {
  default $scheme;
  "~.+"   $http_x_forwarded_proto;
}

# HTTP → HTTPS (en prod uniquement; commenter en dev)
# server {
#   listen 80;
#   server_name _;
#   return 301 https://$host$request_uri;
# }

server {
  listen 80 default_server;
  # listen 443 ssl http2;
  # ssl_certificate     /etc/nginx/certs/fullchain.pem;
  # ssl_certificate_key /etc/nginx/certs/privkey.pem;
  # ssl_protocols TLSv1.3 TLSv1.2;
  # ssl_prefer_server_ciphers on;
  # ssl_session_cache shared:SSL:10m;
  # ssl_session_tickets off;

  server_name _;

  # --- Healthcheck ---
  location = /nginx-health { return 200 "ok"; access_log off; }

  # --- API ---
  location /api/ {
    limit_req zone=api_zone burst=40 nodelay;
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }

  # SSE notifications (long-lived)
  location /api/v1/notifications/stream {
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    chunked_transfer_encoding off;
  }

  # --- Keycloak ---
  # NOTE: no trailing slash on proxy_pass → the `/auth/` prefix is PRESERVED to
  # Keycloak, which serves under that path via KC_HTTP_RELATIVE_PATH=/auth (see
  # infra/docker-compose.prod.yml). Keep nginx and Keycloak's context path in sync.
  location /auth/ {
    proxy_pass http://keycloak_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_set_header X-Forwarded-Host $host;
  }

  # --- Auth endpoints (strict rate-limit) ---
  location ~ ^/(admin|teacher|parent)/(login|register|reset-password|forgot-password) {
    limit_req zone=auth_zone burst=10 nodelay;
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
  }

  # --- Web Next.js ---
  location / {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_set_header Connection "";
  }
}
