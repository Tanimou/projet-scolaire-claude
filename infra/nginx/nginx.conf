user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events { worker_connections 4096; use epoll; multi_accept on; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method","uri":"$request_uri",'
    '"status":$status,"bytes":$body_bytes_sent,"referer":"$http_referer","ua":"$http_user_agent",'
    '"latency_ms":$request_time,"upstream":"$upstream_addr","host":"$host"}';

  access_log /var/log/nginx/access.log json_combined;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 25m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types application/javascript application/json application/xml text/css text/plain text/xml application/manifest+json image/svg+xml;

  # Common security headers (CSP appliquée plus précisément dans Next.js)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  include /etc/nginx/conf.d/*.conf;
}
